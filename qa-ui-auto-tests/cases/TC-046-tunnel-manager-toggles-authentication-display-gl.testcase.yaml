id: TC-046
title: Tunnel manager toggles authentication display globally
covers: [F8.2]
tags: [legacy-imported, p1, tunnel]
modes: [browser]
fixtures: [reset_db, ssh_required]
steps:
  - open: "${cfg.app.base_url}"
  - click: "[data-testid=\"ribbon-tunneling\"]"
  - wait_for: "text=\"New SSH tunnel\""
  - click: "button:has-text(\"New SSH tunnel\")"
  - wait: 1
  - wait_for: "input[placeholder=\"e.g. postgres-replica\"]"
  - fill: {selector: "input[placeholder=\"e.g. postgres-replica\"]", value: qa-ui-auto-tunnel-auth}
  - fill: {selector: "input[placeholder=\"ssh.example.com\"]", value: "${cfg.ssh.host}"}
  - fill: {selector: "input[placeholder=\"user\"]", value: "${cfg.ssh.user}"}
  - fill: {selector: "input[placeholder=\"22\"]", value: "${cfg.ssh.port}"}
  - fill: {selector: 'input[placeholder="0"]', value: "19190"}
  - click: 'button:has-text("Save")'
  - wait: 1
  - wait_for: "text=\"qa-ui-auto-tunnel-auth\""
  - click: 'tr:has-text("qa-ui-auto-tunnel-auth") button[title*="credentials" i]'
  - wait: 1
  - seed_dialog: {confirm: true}
  - screenshot: 046-tunnel-auth-display.png
