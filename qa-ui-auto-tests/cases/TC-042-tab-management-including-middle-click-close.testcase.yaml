id: TC-042
title: Tab management including middle-click close
covers: [F1.5]
tags: [legacy-imported, mouse, needs-review, p1, tabs]
modes: [browser]
fixtures: [reset_db]
steps:
  - open: "${cfg.app.base_url}"
  - click: "[data-testid=\"welcome-open-local-terminal\"]"
  - wait_for: "[data-testid=\"terminal-pane\"]"
  - click: "[data-testid=\"new-local-terminal\"]"
  - wait_for: "[data-testid=\"terminal-pane\"]"
  # _TODO_MIGRATE: legacy step could not be auto-converted; please fix:
  # async page => { const count = await page.locator(`[data-testid="tab-item"]`).count(); if (count < 2) throw new Error("Expected at least 2 tabs"); }
  - eval_readonly:
      expression: 'true'
      contains: 'true'
  # _TODO_MIGRATE: legacy step could not be auto-converted; please fix:
  # async page => { await page.locator(`[data-testid="tab-item"]`).last().click({ button: "middle" }); }
  - eval_readonly:
      expression: 'true'
      contains: 'true'
  - wait: 1
  - assert_text: {selector: "[data-testid=\"status-bar\"]", contains: 1 terminals}
  - screenshot: 042-tab-middle-click-close.png
