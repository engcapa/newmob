id: TC-042
title: Tab management including middle-click close
covers: [F1.5]
tags: [legacy-imported, mouse, p1, tabs]
modes: [browser]
fixtures: [reset_db]
steps:
  - open: "${cfg.app.base_url}"
  - click: "[data-testid=\"welcome-open-local-terminal\"]"
  - wait_for: "[data-testid=\"terminal-pane\"]"
  - click: "[data-testid=\"new-local-terminal\"]"
  - wait_for: "[data-testid=\"terminal-pane\"]"
  - assert_count: {selector: '[data-testid="tab-item"]', min: 2}
  # Middle-click can't be issued via verbs; click the per-tab close icon (SVG) to
  # verify tab close. Welcome tab has no close icon (non-closable), so we target
  # a closable terminal tab.
  - click: '[data-testid="tab-item"][data-tab-type="terminal"] svg:last-child'
  - wait: 1
  - assert_text: {selector: "[data-testid=\"status-bar\"]", contains: 1 terminals}
  - screenshot: 042-tab-middle-click-close.png
