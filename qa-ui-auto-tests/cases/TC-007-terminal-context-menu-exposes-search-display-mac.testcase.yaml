id: TC-007
title: Terminal context menu exposes search, display, macros, and event log
covers: [F4.1, F4.2, F4.7]
tags: [legacy-imported, needs-review, p1, right-menu, search, terminal]
modes: [browser]
fixtures: [reset_db, ssh_required]
steps:
  - open: "${cfg.app.base_url}"
  - fill: {selector: "[data-testid=\"qc-input\"]", value: "ssh://${cfg.ssh.user}@${cfg.ssh.host}:${cfg.ssh.port}"}
  - click: "[data-testid=\"qc-submit\"]"
  - wait_for: "[data-testid=\"auth-prompt\"]"
  - fill: {selector: "[data-testid=\"auth-password\"]", value: "${env.QA_SSH_PASSWORD}"}
  - click: "[data-testid=\"auth-submit\"]"
  - wait_for: "[data-testid=\"terminal-pane\"]"
  - wait: 2
  - click: "[data-testid=\"terminal-pane\"]"
  - type: "printf \"qa-ui-auto-search\\n\""
  - press: Enter
  - wait: 1
  # _TODO_MIGRATE: legacy step could not be auto-converted; please fix:
  # async page => { await page.locator(`[data-testid="terminal-pane"]`).click({ button: "right", position: { x: 24, y: 24 } }); }
  - eval_readonly:
      expression: 'true'
      contains: 'true'
  - wait_for: "[data-testid=\"context-menu\"]"
  - assert_visible: "text=\"Copy All\""
  - assert_visible: "text=\"Paste\""
  - assert_visible: "text=\"Find\""
  - assert_visible: "text=\"Font settings\""
  - assert_visible: "text=\"Terminal display\""
  - assert_visible: "text=\"Syntax highlighting\""
  - assert_visible: "text=\"Record new macro\""
  - assert_visible: "text=\"Special Command\""
  - assert_visible: "text=\"Event Log\""
  - click: "[data-testid=\"context-menu-item-find\"]"
  - wait_for: "input[placeholder=\"Find\"]"
  - fill: {selector: "input[placeholder=\"Find\"]", value: qa-ui-auto-search}
  - press: Enter
  # _TODO_MIGRATE: legacy step could not be auto-converted; please fix:
  # async page => { const s = await page.locator(`span`).filter({ hasText: /^Match \d+\/\d+$/ }).first().isVisible(); if (!s) throw new Error("Search status not showing Match N/M"); }
  - eval_readonly:
      expression: 'true'
      contains: 'true'
  - click: "role=button[name=\"Close\"]"
  # _TODO_MIGRATE: legacy step could not be auto-converted; please fix:
  # async page => { await page.locator(`[data-testid="terminal-pane"]`).click({ button: "right", position: { x: 24, y: 24 } }); }
  - eval_readonly:
      expression: 'true'
      contains: 'true'
  - wait_for: "[data-testid=\"context-menu\"]"
  - hover: text=Terminal display
  - assert_visible: "text=\"Read-only terminal\""
  - assert_visible: "text=\"Fullscreen terminal\""
  - click: "[data-testid=\"context-menu-item-event-log\"]"
  - assert_visible: "text=\"Event Log\""
  - screenshot: 007-terminal-right-menu.png
