id: TC-053
title: Session tree drag-and-drop moves session into a folder
covers: [F6.2]
tags: [drag-drop, folders, legacy-imported, p1, session]
modes: [browser]
fixtures: [reset_db, ssh_required]
steps:
  - open: "${cfg.app.base_url}"
  - click: "[data-testid=\"session-new\"]"
  - wait_for: "[data-testid=\"session-editor\"]"
  - fill: {selector: "[data-testid=\"session-host\"]", value: "${cfg.ssh.host}"}
  - fill: {selector: "[data-testid=\"session-port\"]", value: "${cfg.ssh.port}"}
  - fill: {selector: "[data-testid=\"session-user\"]", value: "${cfg.ssh.user}"}
  - click: "[data-testid=\"session-section-bookmark\"]"
  - wait_for: "[data-testid=\"bookmark-settings\"]"
  - fill: {selector: "[data-testid=\"session-name\"]", value: qa-ui-auto-dnd-target}
  - click: "[data-testid=\"session-save\"]"
  - wait_for: "[data-testid=\"session-tree-item\"][data-session-name=\"qa-ui-auto-dnd-target\"]"
  - right_click: { selector: "[data-testid=\"session-tree\"]", position: { x: 16, y: 16 } }
  - wait_for: "[data-testid=\"context-menu\"]"
  - click: '[data-testid="context-menu"] >> text=/new folder|new group|create folder/i'
  - wait_for: "[data-testid=\"folder-name-dialog\"]"
  - fill: {selector: "[data-testid=\"folder-name-dialog-input\"]", value: qa-ui-auto-dnd-group}
  - click: "[data-testid=\"folder-name-dialog-confirm\"]"
  - wait: 1
  - drag_to:
      from: '[data-testid="session-tree-item"][data-session-name="qa-ui-auto-dnd-target"]'
      to: '[data-testid="session-tree"] >> text="qa-ui-auto-dnd-group"'
  - wait: 1
  - assert_visible: "text=\"qa-ui-auto-dnd-group\""
  - screenshot: 053-session-tree-drag-drop.png
