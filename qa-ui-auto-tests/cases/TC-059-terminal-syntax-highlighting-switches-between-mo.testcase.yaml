id: TC-059
title: Terminal syntax highlighting switches between modes
covers: [F4.3]
tags: [highlighting, legacy-imported, p1, syntax, terminal]
modes: [browser]
fixtures: [reset_db]
steps:
  - open: "${cfg.app.base_url}"
  - click: "[data-testid=\"welcome-open-local-terminal\"]"
  - wait_for: "[data-testid=\"terminal-pane\"]"
  - click: "[data-testid=\"terminal-pane\"]"
  - type: echo error warning success
  - press: Enter
  - wait: 1
  - right_click: { selector: "[data-testid=\"terminal-pane\"]", position: { x: 24, y: 24 } }
  - wait_for: "[data-testid=\"context-menu\"]"
  - hover: "text=\"Syntax highlighting\""
  - wait: 1
  - click: "text=\"Error/Warning/Success keywords\""
  - wait: 1
  - right_click: { selector: "[data-testid=\"terminal-pane\"]", position: { x: 24, y: 24 } }
  - wait_for: "[data-testid=\"context-menu\"]"
  - hover: "text=\"Syntax highlighting\""
  - wait: 1
  - click: "text=\"Default\""
  - wait: 1
  - screenshot: 059-terminal-syntax-highlight.png
