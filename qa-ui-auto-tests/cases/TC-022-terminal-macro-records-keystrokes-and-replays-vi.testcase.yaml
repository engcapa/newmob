id: TC-022
title: Terminal macro records keystrokes and replays via Ctrl+Space
covers: [F4.4]
tags: [legacy-imported, macro, needs-review, p1, terminal]
modes: [browser]
fixtures: [reset_db]
steps:
  - open: "${cfg.app.base_url}"
  - click: "[data-testid=\"welcome-open-local-terminal\"]"
  - wait_for: "[data-testid=\"terminal-pane\"]"
  - click: "[data-testid=\"terminal-pane\"]"
  - wait: 1
  # _TODO_MIGRATE: legacy step could not be auto-converted; please fix:
  # async page => { await page.locator(`[data-testid="terminal-pane"]`).click({ button: "right", position: { x: 24, y: 24 } }); }
  - eval_readonly:
      expression: 'true'
      contains: 'true'
  - wait_for: "[data-testid=\"context-menu\"]"
  - click: "text=\"Record new macro\""
  - wait: 1
  - click: "[data-testid=\"terminal-pane\"]"
  - type: echo qa-macro-payload
  - press: Enter
  - wait: 1
  # _TODO_MIGRATE: legacy step could not be auto-converted; please fix:
  # async page => { await page.locator(`[data-testid="terminal-pane"]`).click({ button: "right", position: { x: 24, y: 24 } }); }
  - eval_readonly:
      expression: 'true'
      contains: 'true'
  - wait_for: "[data-testid=\"context-menu\"]"
  - assert_visible: "text=\"Stop macro recording\""
  - click: "text=\"Stop macro recording\""
  - wait: 1
  - click: "[data-testid=\"terminal-pane\"]"
  - press: Control+Space
  - wait: 1
  - assert_text: {selector: "[data-testid=\"terminal-pane\"]", contains: qa-macro-payload}
  - screenshot: 022-terminal-macro.png
