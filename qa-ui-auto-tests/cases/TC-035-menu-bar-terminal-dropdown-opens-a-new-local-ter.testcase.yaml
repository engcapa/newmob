id: TC-035
title: Menu bar Terminal dropdown opens a new local terminal
covers: [F1.2]
tags: [legacy-imported, main, menu-bar, p1]
modes: [browser, native]
fixtures: [reset_db]
steps:
  - open: "${cfg.app.base_url}"
  - wait_for: "[data-testid=\"menu-bar\"]"
  - click: '[data-testid="menu-bar"] button:has-text("Terminal")'
  - wait_for: "[data-testid=\"context-menu\"]"
  - assert_visible: "text=\"New local terminal\""
  - assert_visible: "text=\"New remote session…\""
  - assert_visible: "text=\"Close active tab\""
  - click: "text=\"New local terminal\""
  - wait_for: "[data-testid=\"terminal-pane\"]"
  - assert_text: {selector: "[data-testid=\"status-bar\"]", contains: 1 terminals}
  - click: '[data-testid="menu-bar"] button:has-text("Sessions")'
  - wait_for: "[data-testid=\"context-menu\"]"
  - assert_visible: "text=\"New session…\""
  - assert_visible: "text=\"Show sessions\""
  - assert_visible: "text=\"Reload sessions\""
  - press: Escape
  - screenshot: 035-menubar-dropdowns.png
