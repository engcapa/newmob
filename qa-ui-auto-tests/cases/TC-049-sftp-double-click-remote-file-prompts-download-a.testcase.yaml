id: TC-049
title: SFTP double-click remote file prompts download and open
covers: [F7.2]
tags: [download, legacy-imported, open, p1, sftp]
modes: [browser]
fixtures: [reset_db, ssh_required, sftp_required]
steps:
  - open: "${cfg.app.base_url}"
  - fill: {selector: "[data-testid=\"qc-input\"]", value: "ssh://${cfg.ssh.user}@${cfg.ssh.host}:${cfg.ssh.port}"}
  - click: "[data-testid=\"qc-submit\"]"
  - wait_for: "[data-testid=\"auth-prompt\"]"
  - fill: {selector: "[data-testid=\"auth-password\"]", value: "${env.QA_SSH_PASSWORD}"}
  - click: "[data-testid=\"auth-submit\"]"
  - wait_for: "[data-testid=\"terminal-pane\"]"
  - wait: 2
  - click: "[data-testid=\"attached-sftp-toggle\"]"
  - wait_for: "[data-testid=\"sftp-browser\"]"
  - fill: {selector: "[data-testid=\"sftp-remote-path\"]", value: "${cfg.sftp.remote_test_dir}"}
  - press: Enter
  - wait: 1
  - seed_dialog: {prompt: qa-ui-auto-dblclick.txt, confirm: true}
  - click: "[data-testid=\"sftp-remote-new-file\"]"
  - wait: 1
  - dblclick: '[data-testid="sftp-remote-pane"] >> text="qa-ui-auto-dblclick.txt"'
  - wait: 1
  - assert_visible: "text=\"Open remote file?\""
  - assert_visible: "text=\"Download & open\""
  - click: "text=\"Download only\""
  - wait: 2
  - click: '[data-testid="sftp-remote-pane"] >> text="qa-ui-auto-dblclick.txt"'
  - click: "[data-testid=\"sftp-remote-delete\"]"
  - wait: 1
  - screenshot: 049-sftp-double-click-download.png
