id: TC-031
title: SFTP transfer queue exposes pause, resume, and cancel controls
covers: [F7.3]
tags: [legacy-imported, needs-review, p1, queue, sftp, transfer]
modes: [browser]
fixtures: [reset_db, ssh_required, sftp_required]
steps:
  - open: "${cfg.app.base_url}"
  - fill: {selector: "[data-testid=\"qc-input\"]", value: "ssh://${cfg.ssh.user}@${cfg.ssh.host}:${cfg.ssh.port}"}
  - click: "[data-testid=\"qc-submit\"]"
  - wait_for: "[data-testid=\"auth-prompt\"]"
  - fill: {selector: "[data-testid=\"auth-password\"]", value: "${env.QA_SSH_PASSWORD}"}
  - click: "[data-testid=\"auth-submit\"]"
  - wait_for: "[data-testid=\"terminal-pane\"]"
  - wait: 2
  - click: "[data-testid=\"attached-sftp-toggle\"]"
  - wait_for: "[data-testid=\"sftp-browser\"]"
  - fill: {selector: "[data-testid=\"sftp-remote-path\"]", value: "${cfg.sftp.remote_test_dir}"}
  - press: Enter
  - wait: 1
  - seed_dialog: {prompt: qa-ui-auto-queue.txt, confirm: true}
  - click: "[data-testid=\"sftp-local-new-file\"]"
  - wait: 1
  # _TODO_MIGRATE: legacy step could not be auto-converted; please fix:
  # async page => { await page.locator(`[data-testid="sftp-local-pane"]`).locator(`text="qa-ui-auto-queue.txt"`).first().click(); }
  - eval_readonly:
      expression: 'true'
      contains: 'true'
  - click: "[data-testid=\"sftp-local-upload-selected\"]"
  - wait_for: "[data-testid=\"sftp-transfer-queue\"]"
  # _TODO_MIGRATE: legacy step could not be auto-converted; please fix:
  # async page => { const queue = page.locator(`[data-testid="sftp-transfer-queue"]`); const titles = await queue.locator(`button[title]`).evaluateAll((els) => els.map((e) => e.getAttribute("title"))); const expected = ["Pause", "Resume", "Retr
  - eval_readonly:
      expression: 'true'
      contains: 'true'
  # _TODO_MIGRATE: legacy step could not be auto-converted; please fix:
  # async page => { const remove = page.locator(`[data-testid="sftp-transfer-queue"] button[title="Remove from list"]`).first(); if (await remove.count()) await remove.click(); }
  - eval_readonly:
      expression: 'true'
      contains: 'true'
  - wait: 1
  # _TODO_MIGRATE: legacy step could not be auto-converted; please fix:
  # async page => { await page.locator(`[data-testid="sftp-remote-pane"]`).locator(`text="qa-ui-auto-queue.txt"`).first().click().catch(() => {}); }
  - eval_readonly:
      expression: 'true'
      contains: 'true'
  - click: "[data-testid=\"sftp-remote-delete\"]"
  - wait: 1
  # _TODO_MIGRATE: legacy step could not be auto-converted; please fix:
  # async page => { await page.locator(`[data-testid="sftp-local-pane"]`).locator(`text="qa-ui-auto-queue.txt"`).first().click().catch(() => {}); }
  - eval_readonly:
      expression: 'true'
      contains: 'true'
  - click: "[data-testid=\"sftp-local-delete\"]"
  - wait: 1
