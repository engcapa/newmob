id: TC-023
title: Terminal saves buffer to file and toggles output recording
covers: [F4.5]
tags: [export, legacy-imported, logging, p1, terminal]
modes: [browser]
fixtures: [reset_db]
steps:
  - open: "${cfg.app.base_url}"
  - click: "[data-testid=\"welcome-open-local-terminal\"]"
  - wait_for: "[data-testid=\"terminal-pane\"]"
  - click: "[data-testid=\"terminal-pane\"]"
  - type: echo qa-buffer-export-line
  - press: Enter
  - wait: 1
  - right_click: { selector: "[data-testid=\"terminal-pane\"]", position: { x: 24, y: 24 } }
  - wait_for: "[data-testid=\"context-menu\"]"
  - assert_visible: "text=\"Save to file\""
  - assert_visible: "text=\"Record terminal output to file\""
  - click: "text=\"Record terminal output to file\""
  - wait: 1
  - click: "[data-testid=\"terminal-pane\"]"
  - type: echo qa-recorded-line
  - press: Enter
  - wait: 1
  - right_click: { selector: "[data-testid=\"terminal-pane\"]", position: { x: 24, y: 24 } }
  - wait_for: "[data-testid=\"context-menu\"]"
  - assert_visible: "text=\"Stop recording terminal output\""
  - click: "text=\"Stop recording terminal output\""
  - wait: 1
  - assert_text: {selector: "[data-testid=\"status-bar\"]", contains: recorded}
  - screenshot: 023-terminal-output-recording.png
