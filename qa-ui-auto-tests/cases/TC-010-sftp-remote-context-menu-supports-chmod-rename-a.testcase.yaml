id: TC-010
title: SFTP remote context menu supports chmod, rename, and delete
covers: [F7.5]
tags: [chmod, legacy-imported, p1, right-menu, sftp]
modes: [browser]
fixtures: [reset_db, ssh_required, sftp_required]
steps:
  - open: "${cfg.app.base_url}"
  - fill: {selector: "[data-testid=\"qc-input\"]", value: "ssh://${cfg.ssh.user}@${cfg.ssh.host}:${cfg.ssh.port}"}
  - click: "[data-testid=\"qc-submit\"]"
  - wait_for: "[data-testid=\"auth-prompt\"]"
  - fill: {selector: "[data-testid=\"auth-password\"]", value: "${env.QA_SSH_PASSWORD}"}
  - click: "[data-testid=\"auth-submit\"]"
  - wait_for: "[data-testid=\"terminal-pane\"]"
  - wait: 2
  - click: "[data-testid=\"attached-sftp-toggle\"]"
  - wait_for: "[data-testid=\"sftp-browser\"]"
  - click: "[data-testid=\"sftp-remote-path\"]"
  - fill: {selector: "[data-testid=\"sftp-remote-path\"]", value: "${cfg.sftp.remote_test_dir}"}
  - press: Enter
  - wait: 1
  - seed_dialog: {confirm: true}
  - right_click: { selector: "[data-testid=\"sftp-remote-list\"]", position: { x: 120, y: 220 } }
  - wait_for: "[data-testid=\"context-menu\"]"
  - assert_visible: "text=\"New folder…\""
  - assert_visible: "text=\"New file…\""
  - press: Escape
  - seed_dialog: {prompt: qa-ui-auto-menu.txt, confirm: true}
  - click: "[data-testid=\"sftp-remote-new-file\"]"
  - wait_for: "text=\"qa-ui-auto-menu.txt\""
  - right_click: '[data-testid="sftp-remote-pane"] >> text="qa-ui-auto-menu.txt"'
  - wait_for: "[data-testid=\"context-menu\"]"
  - assert_visible: "text=\"Download to local\""
  - assert_visible: "text=\"Rename\""
  - assert_visible: "text=\"Permissions…\""
  - assert_visible: "text=\"Delete\""
  - click: "[data-testid=\"context-menu-item-permissions\"]"
  - wait_for: "[aria-label=\"Permissions\"]"
  - assert_visible: "text=\"Owner\""
  - assert_visible: "text=\"Group\""
  - assert_visible: "text=\"Other\""
  - click: "role=button[name=\"Apply\"]"
  - wait: 1
  - seed_dialog: {prompt: qa-ui-auto-menu-renamed.txt, confirm: true}
  - right_click: '[data-testid="sftp-remote-pane"] >> text="qa-ui-auto-menu.txt"'
  - wait_for: "[data-testid=\"context-menu\"]"
  - click: "[data-testid=\"context-menu-item-rename\"]"
  - wait_for: "text=\"qa-ui-auto-menu-renamed.txt\""
  - click: '[data-testid="sftp-remote-pane"] >> text="qa-ui-auto-menu-renamed.txt"'
  - click: "[data-testid=\"sftp-remote-delete\"]"
  - wait: 1
  - screenshot: 010-sftp-context-chmod-rename.png
