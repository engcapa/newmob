id: TC-039
title: Quick-connect rejects empty SSH URL and accepts valid SSH URL
covers: [F6.4]
tags: [legacy-imported, p1, quickconnect, validation]
modes: [browser, native]
fixtures: [reset_db, ssh_required]
steps:
  - open: "${cfg.app.base_url}"
  - wait_for: "[data-testid=\"qc-input\"]"
  - fill: {selector: "[data-testid=\"qc-input\"]", value: "ssh://"}
  - click: "[data-testid=\"qc-submit\"]"
  - wait: 1
  - assert_not_visible: "[data-testid=\"auth-prompt\"]"
  - fill: {selector: "[data-testid=\"qc-input\"]", value: "ssh://${cfg.ssh.user}@${cfg.ssh.host}:${cfg.ssh.port}"}
  - click: "[data-testid=\"qc-submit\"]"
  - wait_for: "[data-testid=\"auth-prompt\"]"
  - assert_visible: "[data-testid=\"auth-password\"]"
  - press: Escape
  - screenshot: 039-quickconnect-validation.png
