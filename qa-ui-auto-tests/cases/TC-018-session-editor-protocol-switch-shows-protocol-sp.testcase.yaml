  - click: "[data-testid=\"session-proto-sftp\"]"
  - wait: 1
  - assert_visible: "[data-testid=\"session-host\"]"
  - assert_visible: "[data-testid=\"session-user\"]"
  - click: "[data-testid=\"session-proto-rdp\"]"
  - wait: 1
  - assert_visible: "[data-testid=\"session-host\"]"
  - click: "[data-testid=\"session-proto-vnc\"]"
  - wait: 1
  - assert_visible: "[data-testid=\"session-host\"]"
  - click: "[data-testid=\"session-proto-ssh\"]"
  - assert_visible: "[data-testid=\"advanced-ssh-settings\"]"
  - screenshot: 018-session-protocol-switch.png
