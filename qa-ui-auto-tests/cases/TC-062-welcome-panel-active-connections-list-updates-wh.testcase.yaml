id: TC-062
title: Welcome panel active connections list updates when terminals open
covers: [F1.6]
tags: [connections, legacy-imported, p1, welcome]
modes: [browser]
fixtures: [reset_db]
steps:
  - open: "${cfg.app.base_url}"
  - wait_for: "[data-testid=\"welcome-panel\"]"
  - assert_visible: "text=\"Active connections\""
  - assert_visible: "text=\"No active terminal tabs.\""
  - click: "[data-testid=\"welcome-open-local-terminal\"]"
  - wait_for: "[data-testid=\"terminal-pane\"]"
  - wait: 1
  - click: '[data-testid="tab-item"][data-tab-type="welcome"]'
  - wait: 1
  - assert_text: {selector: '[data-testid="welcome-panel"]', contains: "local shell"}
  - screenshot: 062-welcome-active-connections.png
