id: TC-052
title: SFTP local pane creates a new folder via toolbar and context menu
covers: [F7.2]
tags: [folder, legacy-imported, local, needs-review, p1, sftp]
modes: [browser]
fixtures: [reset_db, ssh_required]
steps:
  - open: "${cfg.app.base_url}"
  - fill: {selector: "[data-testid=\"qc-input\"]", value: "ssh://${cfg.ssh.user}@${cfg.ssh.host}:${cfg.ssh.port}"}
  - click: "[data-testid=\"qc-submit\"]"
  - wait_for: "[data-testid=\"auth-prompt\"]"
  - fill: {selector: "[data-testid=\"auth-password\"]", value: "${env.QA_SSH_PASSWORD}"}
  - click: "[data-testid=\"auth-submit\"]"
  - wait_for: "[data-testid=\"terminal-pane\"]"
  - wait: 2
  - click: "[data-testid=\"attached-sftp-toggle\"]"
  - wait_for: "[data-testid=\"sftp-browser\"]"
  - seed_dialog: {prompt: qa-ui-auto-local-folder, confirm: true}
  - click: "[data-testid=\"sftp-local-new-folder\"]"
  - wait: 1
  - wait_for: "text=\"qa-ui-auto-local-folder\""
  # _TODO_MIGRATE: legacy step could not be auto-converted; please fix:
  # async page => { await page.locator(`[data-testid="sftp-local-pane"]`).locator(`text="qa-ui-auto-local-folder"`).first().click({ button: "right" }); }
  - eval_readonly:
      expression: 'true'
      contains: 'true'
  - wait_for: "[data-testid=\"context-menu\"]"
  - assert_visible: "text=\"Delete\""
  - click: "text=\"Delete\""
  - wait: 1
  - screenshot: 052-sftp-local-new-folder.png
