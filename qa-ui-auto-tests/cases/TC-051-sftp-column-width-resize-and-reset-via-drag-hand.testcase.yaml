id: TC-051
title: SFTP column width resize and reset via drag handle
covers: [F7.2]
tags: [columns, legacy-imported, p1, resize, sftp]
modes: [browser]
fixtures: [reset_db, ssh_required, sftp_required]
steps:
  - open: "${cfg.app.base_url}"
  - fill: {selector: "[data-testid=\"qc-input\"]", value: "ssh://${cfg.ssh.user}@${cfg.ssh.host}:${cfg.ssh.port}"}
  - click: "[data-testid=\"qc-submit\"]"
  - wait_for: "[data-testid=\"auth-prompt\"]"
  - fill: {selector: "[data-testid=\"auth-password\"]", value: "${env.QA_SSH_PASSWORD}"}
  - click: "[data-testid=\"auth-submit\"]"
  - wait_for: "[data-testid=\"terminal-pane\"]"
  - wait: 2
  - click: "[data-testid=\"attached-sftp-toggle\"]"
  - wait_for: "[data-testid=\"sftp-browser\"]"
  - fill: {selector: "[data-testid=\"sftp-remote-path\"]", value: "${cfg.sftp.remote_test_dir}"}
  - press: Enter
  - wait: 1
  - drag_to: { from: '[data-testid="col-resize-name"]', to: '[data-testid="col-resize-size"]' }
  - wait: 1
  - drag_to: { from: '[data-testid="col-resize-size"]', to: '[data-testid="col-resize-modified"]' }
  - wait: 1
  - dblclick: '[data-testid="col-resize-name"]'
  - wait: 1
  - screenshot: 051-sftp-column-resize.png
