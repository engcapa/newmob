id: TC-050
title: SFTP multi-select and select-all in remote pane
covers: [F7.2]
tags: [legacy-imported, multi-select, p1, selection, sftp]
modes: [browser]
fixtures: [reset_db, ssh_required, sftp_required]
steps:
  - open: "${cfg.app.base_url}"
  - fill: {selector: "[data-testid=\"qc-input\"]", value: "ssh://${cfg.ssh.user}@${cfg.ssh.host}:${cfg.ssh.port}"}
  - click: "[data-testid=\"qc-submit\"]"
  - wait_for: "[data-testid=\"auth-prompt\"]"
  - fill: {selector: "[data-testid=\"auth-password\"]", value: "${env.QA_SSH_PASSWORD}"}
  - click: "[data-testid=\"auth-submit\"]"
  - wait_for: "[data-testid=\"terminal-pane\"]"
  - wait: 2
  - click: "[data-testid=\"attached-sftp-toggle\"]"
  - wait_for: "[data-testid=\"sftp-browser\"]"
  - fill: {selector: "[data-testid=\"sftp-remote-path\"]", value: "${cfg.sftp.remote_test_dir}"}
  - press: Enter
  - wait: 1
  - seed_dialog: {prompt: ["qa-ui-auto-ms-a.txt", "qa-ui-auto-ms-b.txt"], confirm: true}
  - click: "[data-testid=\"sftp-remote-new-file\"]"
  - wait: 1
  - click: "[data-testid=\"sftp-remote-new-file\"]"
  - wait: 1
  - click: '[data-testid="sftp-remote-pane"] >> text="qa-ui-auto-ms-a.txt"'
  - click:
      selector: '[data-testid="sftp-remote-pane"] >> text="qa-ui-auto-ms-b.txt"'
      modifiers: [Control]
  - assert_text: {selector: '[data-testid="sftp-remote-pane"]', contains: "2 selected"}
  - click: "[data-testid=\"sftp-remote-list\"]"
  - press: Control+a
  - wait: 1
  - assert_text: {selector: '[data-testid="sftp-remote-pane"]', contains: "selected"}
  - click: '[data-testid="sftp-remote-pane"] >> text="qa-ui-auto-ms-a.txt"'
  - click: "[data-testid=\"sftp-remote-delete\"]"
  - wait: 1
  - click: '[data-testid="sftp-remote-pane"] >> text="qa-ui-auto-ms-b.txt"'
  - click: "[data-testid=\"sftp-remote-delete\"]"
  - wait: 1
  - screenshot: 050-sftp-multiselect.png
