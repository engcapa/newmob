id: TC-036
title: Session tree creates folders and moves a session via context menu
covers: [F6.2]
tags: [folders, legacy-imported, p1, session]
modes: [browser]
fixtures: [reset_db, ssh_required]
steps:
  - open: "${cfg.app.base_url}"
  - click: "[data-testid=\"session-new\"]"
  - wait_for: "[data-testid=\"session-editor\"]"
  - fill: {selector: "[data-testid=\"session-host\"]", value: "${cfg.ssh.host}"}
  - fill: {selector: "[data-testid=\"session-port\"]", value: "${cfg.ssh.port}"}
  - send_text_via_label: {label_contains: Specify username, checked: true}
  - fill: {selector: "[data-testid=\"session-user\"]", value: "${cfg.ssh.user}"}
  - click: "[data-testid=\"session-section-bookmark\"]"
  - wait_for: "[data-testid=\"bookmark-settings\"]"
  - fill: {selector: "[data-testid=\"session-name\"]", value: qa-ui-auto-folder-target}
  - click: "[data-testid=\"session-save\"]"
  - wait_for: "[data-testid=\"session-tree-item\"][data-session-name=\"qa-ui-auto-folder-target\"]"
  - right_click: { selector: "[data-testid=\"session-tree\"]", position: { x: 16, y: 16 } }
  - wait_for: "[data-testid=\"context-menu\"]"
  - click: '[data-testid="context-menu"] >> text=/new folder|new group|create folder/i'
  - wait_for: "[data-testid=\"folder-name-dialog\"]"
  - fill: {selector: "[data-testid=\"folder-name-dialog-input\"]", value: qa-ui-auto-group}
  - click: "[data-testid=\"folder-name-dialog-confirm\"]"
  - wait: 1
  - right_click: "[data-testid=\"session-tree-item\"][data-session-name=\"qa-ui-auto-folder-target\"]"
  - wait_for: "[data-testid=\"context-menu\"]"
  - hover: 'text="Move to folder"'
  - wait_for: "text=\"qa-ui-auto-group\""
  - click: "text=\"qa-ui-auto-group\""
  - wait: 1
  - assert_visible: "text=\"qa-ui-auto-group\""
  - screenshot: 036-session-tree-folders.png
