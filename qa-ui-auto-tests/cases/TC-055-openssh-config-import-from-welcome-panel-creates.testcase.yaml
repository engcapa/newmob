id: TC-055
title: OpenSSH config import from Welcome panel creates sessions
covers: [F6.6]
tags: [import, legacy-imported, openssh, p1, session]
modes: [browser]
fixtures: [reset_db, ssh_required]
steps:
  - open: "${cfg.app.base_url}"
  - wait_for: "[data-testid=\"welcome-panel\"]"
  - assert_visible: "text=\"Import OpenSSH config\""
  - click: 'text="Import OpenSSH config"'
  - wait: 1
  - screenshot: 055-openssh-config-import.png
