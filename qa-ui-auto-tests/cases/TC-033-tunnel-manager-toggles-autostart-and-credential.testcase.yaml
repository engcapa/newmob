id: TC-033
title: Tunnel manager toggles autostart and credential reveal per row
covers: [F8.2]
tags: [autostart, credentials, legacy-imported, p1, tunnel]
modes: [browser]
fixtures: [reset_db, ssh_required]
steps:
  - open: "${cfg.app.base_url}"
  - click: "[data-testid=\"ribbon-tunneling\"]"
  - wait_for: "text=\"New SSH tunnel\""
  - click: "button:has-text(\"New SSH tunnel\")"
  - wait: 1
  - wait_for: "input[placeholder=\"e.g. postgres-replica\"]"
  - fill: {selector: "input[placeholder=\"e.g. postgres-replica\"]", value: qa-ui-auto-tunnel-autostart}
  - fill: {selector: "input[placeholder=\"ssh.example.com\"]", value: "${cfg.ssh.host}"}
  - fill: {selector: "input[placeholder=\"user\"]", value: "${cfg.ssh.user}"}
  - fill: {selector: "input[placeholder=\"22\"]", value: "${cfg.ssh.port}"}
  - fill: {selector: 'input[placeholder="0"]', value: "19181"}
  - click: 'button:has-text("Save")'
  - wait: 1
  - wait_for: "text=\"qa-ui-auto-tunnel-autostart\""
  - click: 'tr:has-text("qa-ui-auto-tunnel-autostart") button[title*="Auto-start" i]'
  - wait: 1
  - click: 'tr:has-text("qa-ui-auto-tunnel-autostart") button[title*="credentials" i]'
  - wait: 1
  - click: 'tr:has-text("qa-ui-auto-tunnel-autostart") button[title="Test SSH connection"]'
  - wait: 2
  - seed_dialog: {confirm: true}
  - wait: 1
  - screenshot: 033-tunnel-autostart-credentials.png
