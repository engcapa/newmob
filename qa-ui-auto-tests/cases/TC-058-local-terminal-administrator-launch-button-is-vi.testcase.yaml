id: TC-058
title: Local terminal administrator launch button is visible and clickable
covers: [F2.1]
tags: [admin, legacy-imported, local, p1, terminal]
modes: [browser, native]
fixtures: [reset_db]
steps:
  - open: "${cfg.app.base_url}"
  - wait_for: "[data-testid=\"welcome-panel\"]"
  - assert_visible: "text=\"Start local terminal\""
  - assert_count: { selector: 'button[aria-label="Open as administrator"]', min: 0 }
  - wait: 1
  - screenshot: 058-local-terminal-admin.png
