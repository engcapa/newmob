id: TC-020
title: Terminal display toggles read-only, fullscreen, and scrollbar
covers: [F4.2]
tags: [display, legacy-imported, p1, right-menu, terminal]
modes: [browser]
fixtures: [reset_db]
steps:
  - open: "${cfg.app.base_url}"
  - click: "[data-testid=\"welcome-open-local-terminal\"]"
  - wait_for: "[data-testid=\"terminal-pane\"]"
  - click: "[data-testid=\"terminal-pane\"]"
  - type: echo qa-display-marker
  - press: Enter
  - wait: 1
  - right_click: { selector: "[data-testid=\"terminal-pane\"]", position: { x: 24, y: 24 } }
  - wait_for: "[data-testid=\"context-menu\"]"
  - hover: text=Terminal display
  - wait_for: "text=\"Read-only terminal\""
  - click: "text=\"Read-only terminal\""
  - wait: 1
  - assert_visible: "text=\"Read-only\""
  - click: "[data-testid=\"terminal-pane\"]"
  - type: this-input-must-be-blocked
  - wait: 1
  - assert_not_visible: 'text=this-input-must-be-blocked'
  - right_click: { selector: "[data-testid=\"terminal-pane\"]", position: { x: 24, y: 24 } }
  - wait_for: "[data-testid=\"context-menu\"]"
  - hover: text=Terminal display
  - click: "text=\"Read-only terminal\""
  - wait: 1
  - right_click: { selector: "[data-testid=\"terminal-pane\"]", position: { x: 24, y: 24 } }
  - wait_for: "[data-testid=\"context-menu\"]"
  - hover: text=Terminal display
  - click: "text=\"Toggle terminal scrollbar\""
  - wait: 1
  - screenshot: 020-terminal-display-toggles.png
