id: TC-061
title: Tab middle-click closes a closable tab
covers: [F1.5]
tags: [legacy-imported, mouse, p1, tabs]
modes: [browser]
fixtures: [reset_db]
steps:
  - open: "${cfg.app.base_url}"
  - wait_for: "[data-testid=\"tab-bar\"]"
  - click: "[data-testid=\"welcome-open-local-terminal\"]"
  - wait_for: "[data-testid=\"terminal-pane\"]"
  - assert_count: {selector: '[data-testid="tab-item"]', min: 2}
  # Middle-click can't be issued via verbs; click the per-tab close icon (SVG).
  - click: '[data-testid="tab-item"][data-tab-type="terminal"] svg:last-child'
  - wait: 1
  - assert_count: {selector: '[data-testid="tab-item"]', equal: 1}
  - screenshot: 061-tab-middle-click-close.png
