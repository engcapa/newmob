      expression: 'true'
      contains: 'true'
  # _TODO_MIGRATE: legacy step could not be auto-converted; please fix:
  # async page => { const tab = page.locator(`[data-testid="tab-item"]`).last(); await tab.click({ button: "middle" }); }
  - eval_readonly:
      expression: 'true'
      contains: 'true'
  - wait: 1
  # _TODO_MIGRATE: legacy step could not be auto-converted; please fix:
