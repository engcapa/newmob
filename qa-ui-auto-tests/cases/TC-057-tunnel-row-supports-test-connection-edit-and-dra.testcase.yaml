id: TC-057
title: Tunnel row supports test connection, edit, and drag reorder
covers: [F8.2]
tags: [edit, legacy-imported, p1, reorder, test, tunnel]
modes: [browser]
fixtures: [reset_db, ssh_required]
steps:
  - open: "${cfg.app.base_url}"
  - click: "[data-testid=\"ribbon-tunneling\"]"
  - wait_for: "[data-testid=\"tunnel-manager\"]"
  - click: "[data-testid=\"tunnel-new\"]"
  - wait_for: "[data-testid=\"tunnel-editor\"]"
  - fill: {selector: "input[placeholder=\"e.g. postgres-replica\"]", value: qa-ui-auto-reorder-a}
  - fill: {selector: "input[placeholder=\"ssh.example.com\"]", value: "${cfg.ssh.host}"}
  - fill: {selector: "input[placeholder=\"user\"]", value: "${cfg.ssh.user}"}
  - fill: {selector: "input[placeholder=\"22\"]", value: "${cfg.ssh.port}"}
  - fill: {selector: 'input[placeholder="0"]', value: "19333"}
  - click: '[data-testid="tunnel-editor-save"]'
  - wait: 1
  - wait_for: "text=\"qa-ui-auto-reorder-a\""
  - click: "[data-testid=\"tunnel-new\"]"
  - wait_for: "[data-testid=\"tunnel-editor\"]"
  - fill: {selector: "input[placeholder=\"e.g. postgres-replica\"]", value: qa-ui-auto-reorder-b}
  - fill: {selector: "input[placeholder=\"ssh.example.com\"]", value: "${cfg.ssh.host}"}
  - fill: {selector: "input[placeholder=\"user\"]", value: "${cfg.ssh.user}"}
  - fill: {selector: "input[placeholder=\"22\"]", value: "${cfg.ssh.port}"}
  - fill: {selector: 'input[placeholder="0"]', value: "19334"}
  - click: '[data-testid="tunnel-editor-save"]'
  - wait: 1
  - wait_for: "text=\"qa-ui-auto-reorder-b\""
  - click: 'tr:has-text("qa-ui-auto-reorder-a") button[title="Move down"]'
  - wait: 1
  - click: 'tr:has-text("qa-ui-auto-reorder-a") button[title="Test SSH connection"]'
  - wait: 2
  - seed_dialog: {confirm: true}
  - wait: 1
  - screenshot: 057-tunnel-reorder-test.png
