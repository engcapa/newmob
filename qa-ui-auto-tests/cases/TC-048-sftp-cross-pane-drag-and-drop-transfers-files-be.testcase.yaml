id: TC-048
title: SFTP cross-pane drag-and-drop transfers files between remote and local
covers: [F7.2, F7.3]
tags: [drag-drop, legacy-imported, p1, sftp, transfer]
modes: [browser]
fixtures: [reset_db, ssh_required, sftp_required]
steps:
  - open: "${cfg.app.base_url}"
  - fill: {selector: "[data-testid=\"qc-input\"]", value: "ssh://${cfg.ssh.user}@${cfg.ssh.host}:${cfg.ssh.port}"}
  - click: "[data-testid=\"qc-submit\"]"
  - wait_for: "[data-testid=\"auth-prompt\"]"
  - fill: {selector: "[data-testid=\"auth-password\"]", value: "${env.QA_SSH_PASSWORD}"}
  - click: "[data-testid=\"auth-submit\"]"
  - wait_for: "[data-testid=\"terminal-pane\"]"
  - wait: 2
  - click: "[data-testid=\"attached-sftp-toggle\"]"
  - wait_for: "[data-testid=\"sftp-browser\"]"
  - fill: {selector: "[data-testid=\"sftp-remote-path\"]", value: "${cfg.sftp.remote_test_dir}"}
  - press: Enter
  - wait: 1
  - seed_dialog: {prompt: qa-ui-auto-drag.txt, confirm: true}
  - click: "[data-testid=\"sftp-local-new-file\"]"
  - wait: 1
  - click: '[data-testid="sftp-local-pane"] >> text="qa-ui-auto-drag.txt"'
  - drag_to:
      from: '[data-testid="sftp-local-pane"] tr:has-text("qa-ui-auto-drag.txt")'
      to: '[data-testid="sftp-remote-pane"] [data-testid="sftp-remote-list"]'
  - wait: 2
  - click: '[data-testid="sftp-remote-pane"] >> text="qa-ui-auto-drag.txt"'
  - drag_to:
      from: '[data-testid="sftp-remote-pane"] tr:has-text("qa-ui-auto-drag.txt")'
      to: '[data-testid="sftp-local-pane"] [data-testid="sftp-local-list"]'
  - wait: 2
  - click: '[data-testid="sftp-remote-pane"] >> text="qa-ui-auto-drag.txt"'
  - click: "[data-testid=\"sftp-remote-delete\"]"
  - wait: 1
  - click: '[data-testid="sftp-local-pane"] >> text="qa-ui-auto-drag.txt"'
  - click: "[data-testid=\"sftp-local-delete\"]"
  - wait: 1
  - screenshot: 048-sftp-cross-pane-drag.png
