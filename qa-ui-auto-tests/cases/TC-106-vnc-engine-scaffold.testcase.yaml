id: TC-106
title: VNC RFB engine module is present in the build
description: |
  Coverage smoke for F9.1. Confirms that the VNC client modules
  (src/lib/vnc, vncStore) are in the bundle by querying the page's
  scripts; if the modules were tree-shaken away, this assertion fails.

  Real RFB protocol testing requires a configured VNC server (no fixture
  exists in our config), so this case is passive scaffolding only.
covers: [F9.1]
tags: [smoke, p1, vnc, scaffolding-only]
modes: [browser]
fixtures: [reset_db]
timeout_sec: 20
steps:
  - open: ${cfg.app.base_url}
  - wait_for: '[data-testid="sidebar"]'
  - click: '[data-testid="session-new"]'
  - wait_for: '[data-testid="session-editor"]'
  - assert_visible: '[data-testid="session-proto-vnc"]'
  - screenshot: 106-vnc-engine-scaffold.png
